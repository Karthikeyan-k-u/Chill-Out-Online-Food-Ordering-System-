<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill & Out - Food Ordering System</title>

    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #d35400;
            --bg-color: #f8f9fa;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 30px 15px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        header p {
            margin: 0;
            color: #666;
        }

        h3 {
            margin-top: 25px;
            color: var(--secondary-color);
        }

        .menu-grid {
            display: grid;
            gap: 15px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fffdfa;
            transition: 0.3s;
        }

        .menu-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(230, 126, 34, 0.18);
        }

        .menu-item label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .menu-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary-color);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .menu-item input[type="checkbox"]:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .menu-item input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 15px;
            font-weight: bold;
            position: absolute;
            left: 4px;
            top: -2px;
        }

        .menu-item input[type="checkbox"]:hover {
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.2);
        }

        .qty-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-qty {
            width: 32px;
            height: 32px;
            padding: 0;
            border: none;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-qty:hover {
            background: var(--secondary-color);
            transform: scale(1.08);
        }

        .qty {
            width: 45px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .place-btn {
            width: 100%;
            padding: 13px;
            margin-top: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .place-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.02);
        }

        #orderSummary {
            margin-top: 25px;
            padding: 18px;
            background: #fdf2e9;
            border-left: 5px solid var(--primary-color);
            border-radius: 8px;
            display: none;
        }

        #orderSummary h3 {
            margin-top: 0;
        }

        @media (max-width: 520px) {
            .container {
                padding: 20px;
            }

            .menu-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .qty-wrapper {
                align-self: flex-end;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>Chill & Out</h1>
            <p>Online Food Ordering System</p>
        </header>

        <h3>Food Menu</h3>

        <div class="menu-grid">

            <div class="menu-item">
                <label>
                    <input type="checkbox" value="120" data-name="Burger" onchange="toggleQty(this)">
                    Burger - ₹120
                </label>

                <div class="qty-wrapper">
                    <button class="btn-qty" type="button" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty" value="0" min="0" readonly>
                    <button class="btn-qty" type="button" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>

            <div class="menu-item">
                <label>
                    <input type="checkbox" value="250" data-name="Pizza" onchange="toggleQty(this)">
                    Pizza - ₹250
                </label>

                <div class="qty-wrapper">
                    <button class="btn-qty" type="button" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty" value="0" min="0" readonly>
                    <button class="btn-qty" type="button" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>

            <div class="menu-item">
                <label>
                    <input type="checkbox" value="90" data-name="Sandwich" onchange="toggleQty(this)">
                    Sandwich - ₹90
                </label>

                <div class="qty-wrapper">
                    <button class="btn-qty" type="button" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty" value="0" min="0" readonly>
                    <button class="btn-qty" type="button" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>

            <div class="menu-item">
                <label>
                    <input type="checkbox" value="80" data-name="Fries" onchange="toggleQty(this)">
                    Fries - ₹80
                </label>

                <div class="qty-wrapper">
                    <button class="btn-qty" type="button" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty" value="0" min="0" readonly>
                    <button class="btn-qty" type="button" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>

            <div class="menu-item">
                <label>
                    <input type="checkbox" value="60" data-name="Juice" onchange="toggleQty(this)">
                    Juice - ₹60
                </label>

                <div class="qty-wrapper">
                    <button class="btn-qty" type="button" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty" value="0" min="0" readonly>
                    <button class="btn-qty" type="button" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>

        </div>

        <h3>Customer Details</h3>

        <input type="text" id="name" placeholder="Enter your name">
        <input type="tel" id="mobile" placeholder="Enter your mobile number">
        <textarea id="address" placeholder="Enter your address"></textarea>

        <button class="place-btn" type="button" onclick="calculateOrder()">Place Order</button>

        <div id="orderSummary"></div>

    </div>

    <script>
        function changeQty(button, change) {
            const menuItem = button.closest(".menu-item");
            const qtyInput = menuItem.querySelector(".qty");
            const checkbox = menuItem.querySelector('input[type="checkbox"]');

            let quantity = parseInt(qtyInput.value);
            quantity += change;

            if (quantity < 0) {
                quantity = 0;
            }

            qtyInput.value = quantity;
            checkbox.checked = quantity > 0;
        }

        function toggleQty(checkbox) {
            const menuItem = checkbox.closest(".menu-item");
            const qtyInput = menuItem.querySelector(".qty");

            if (checkbox.checked && parseInt(qtyInput.value) === 0) {
                qtyInput.value = 1;
            }

            if (!checkbox.checked) {
                qtyInput.value = 0;
            }
        }

        function calculateOrder() {
            const name = document.getElementById("name").value.trim();
            const mobile = document.getElementById("mobile").value.trim();
            const address = document.getElementById("address").value.trim();
            const items = document.querySelectorAll(".menu-item");
            const orderSummary = document.getElementById("orderSummary");

            let summary = "";
            let grandTotal = 0;
            let hasItem = false;

            if (name === "" || mobile === "" || address === "") {
                alert("Please fill all customer details.");
                return;
            }

            summary += `<h3>Order Summary</h3>`;
            summary += `<strong>Customer:</strong> ${name}<br>`;
            summary += `<strong>Mobile:</strong> ${mobile}<br>`;
            summary += `<strong>Address:</strong> ${address}<br><hr>`;

            items.forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                const qty = parseInt(item.querySelector(".qty").value);
                const price = parseInt(checkbox.value);

                if (checkbox.checked && qty > 0) {
                    const subtotal = price * qty;
                    grandTotal += subtotal;
                    hasItem = true;

                    summary += `${checkbox.dataset.name} x${qty} = ₹${subtotal}<br>`;
                }
            });

            if (!hasItem) {
                alert("Please select at least one food item.");
                return;
            }

            summary += `<hr>`;
            summary += `<strong>Grand Total = ₹${grandTotal}</strong><br>`;
            summary += `<em>Thank You for Ordering!</em>`;

            orderSummary.innerHTML = summary;
            orderSummary.style.display = "block";
        }
    </script>

</body>
</html>
